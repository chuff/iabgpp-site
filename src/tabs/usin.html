<div class="mt-3 mb-3 form-check">
  <input
    class="form-check-input"
    type="checkbox"
    value=""
    id="usin-included"
    onclick="disableusin(!this.checked)"
  />
  <label class="form-check-label" for="usin-included">Included</label>
</div>
<div class="mb-3">
  <label for="usin-mspa-version" class="form-label">MSPA Version</label>
  <input type="text" id="usin-mspa-version" class="form-control" placeholder="1" value="1" disabled />
</div>
<div class="mb-3">
  <label for="usin-mspa-covered-transaction" class="form-label">MSPA Covered Transaction</label>
  <input type="number" min="1" max="2" id="usin-mspa-covered-transaction" class="form-control" placeholder="1" value="1" disabled />
  <div id="usin-mspa-covered-transaction-feedback" class="invalid-feedback">Valid values are 1-2</div>
</div>
<div class="mb-3">
  <label for="usin-mspa-mode" class="form-label">MSPA Mode</label>
  <input type="number" min="0" max="2" id="usin-mspa-mode" class="form-control" placeholder="0" value="0" disabled />
  <div id="usin-mspa-mode-feedback" class="invalid-feedback">Valid values are 0-2</div>
</div>
<div class="mb-3">
  <label for="usin-processing-notice" class="form-label">Processing Notice</label>
  <input type="number" min="0" max="2" id="usin-processing-notice" class="form-control" placeholder="0" value="0" disabled />
  <div id="usin-processing-notice-feedback" class="invalid-feedback">Valid values are 0-2</div>
</div>
<div class="mb-3">
  <label for="usin-sale-opt-out-notice" class="form-label">Sale Opt Out Notice</label>

</div>

  <div id="usin-targeted-advertising-opt-out-notice-feedback" class="invalid-feedback">Valid values are 0-2</div>
</div>
<div class="mb-3">
  <label for="usin-sale-opt-out" class="form-label">Sale Opt Out</label>
  <input type="number" min="0" max="2" id="usin-sale-opt-out" class="form-control" placeholder="0" value="0" disabled />

</div>
<div class="mb-3">

</div>
<div class="mb-3">

  <input class="form-check-input" type="checkbox" value="" id="usin-sensitive-data-consent-segment-included" checked disabled />

</div>
